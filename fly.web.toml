app = "textile-erp-web"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.frontend"

  [build.args]
    VITE_API_URL = "https://textile-erp-api.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
