app = "textile-erp-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.backend"

[deploy]
  release_command = "node ./lib/db/run-drizzle.mjs push --config ./drizzle.config.ts"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  TRUST_PROXY = "true"
  RUN_DB_BOOTSTRAP = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
