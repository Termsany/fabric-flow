services:
  postgres:
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roll_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    ports: []

  postgres-backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    volumes:
      - postgres-backups:/backups
      - ./scripts/postgres-backup.sh:/usr/local/bin/postgres-backup.sh:ro
    command: ["sh", "/usr/local/bin/postgres-backup.sh"]

  backend:
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      TRUST_PROXY: "true"
      PORT: 8080
    ports: []
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    restart: always
    environment:
      PORT: 3000
      BASE_PATH: /
      VITE_PROXY_API_TARGET: http://backend:8080
    ports: []

  gateway:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.public.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro

volumes:
  backend-uploads:
  postgres-backups:

