services:
  postgres:
    image: postgres:16-alpine
    container_name: roll-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: roll_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roll_manager"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: roll-manager-backend:latest
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/roll_manager
      JWT_SECRET: change-me
      APP_URL: http://localhost:3000
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@fabric.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-superadmin123}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-مدير المنصة}
      NODE_PATH: /app/lib/db/node_modules:/app/node_modules
      STRIPE_SECRET_KEY: sk_test_replace_me
      STRIPE_WEBHOOK_SECRET: whsec_replace_me
      STRIPE_PRICE_BASIC_MONTHLY: price_replace_basic_monthly
      STRIPE_PRICE_BASIC_YEARLY: price_replace_basic_yearly
      STRIPE_PRICE_PRO_MONTHLY: price_replace_pro_monthly
      STRIPE_PRICE_PRO_YEARLY: price_replace_pro_yearly
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: roll-manager-frontend:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      BASE_PATH: /
      VITE_PROXY_API_TARGET: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
