kind = "web"
previewPath = "/"
title = "Textile ERP - نظام إدارة رولات القماش"
version = "1.0.0"
id = "artifacts/textile-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24628

[services.development]
run = "pnpm --filter @workspace/textile-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/textile-erp", "run", "build" ]
publicDir = "artifacts/textile-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24628"
BASE_PATH = "/"
