openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Textile ERP API - نظام إدارة رولات القماش
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: tenants
    description: Tenant management
  - name: production-orders
    description: Production order management
  - name: fabric-rolls
    description: Fabric roll management
  - name: qc
    description: Quality control
  - name: dyeing
    description: Dyeing operations
  - name: warehouses
    description: Warehouse management
  - name: sales
    description: Sales and customers
  - name: dashboard
    description: Dashboard and analytics
  - name: billing
    description: Subscription billing and Stripe operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new tenant and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in tenant
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Production Orders
  /production-orders:
    get:
      operationId: listProductionOrders
      tags: [production-orders]
      summary: List production orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of production orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionOrder"
    post:
      operationId: createProductionOrder
      tags: [production-orders]
      summary: Create production order and generate rolls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductionOrderRequest"
      responses:
        "201":
          description: Created production order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  /production-orders/{id}:
    get:
      operationId: getProductionOrder
      tags: [production-orders]
      summary: Get production order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Production order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProductionOrder
      tags: [production-orders]
      summary: Update production order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductionOrderRequest"
      responses:
        "200":
          description: Updated production order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  # Fabric Rolls
  /fabric-rolls:
    get:
      operationId: listFabricRolls
      tags: [fabric-rolls]
      summary: List fabric rolls
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: color
          in: query
          schema:
            type: string
        - name: gsm
          in: query
          schema:
            type: number
        - name: productionOrderId
          in: query
          schema:
            type: integer
        - name: warehouseId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of fabric rolls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FabricRoll"

  /fabric-rolls/{id}:
    get:
      operationId: getFabricRoll
      tags: [fabric-rolls]
      summary: Get fabric roll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fabric roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFabricRoll
      tags: [fabric-rolls]
      summary: Update fabric roll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFabricRollRequest"
      responses:
        "200":
          description: Updated fabric roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"

  /fabric-rolls/by-code/{rollCode}:
    get:
      operationId: getFabricRollByCode
      tags: [fabric-rolls]
      summary: Get fabric roll by roll code (for QR scan)
      parameters:
        - name: rollCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fabric roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricRoll"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # QC Reports
  /qc-reports:
    get:
      operationId: listQcReports
      tags: [qc]
      summary: List QC reports
      parameters:
        - name: fabricRollId
          in: query
          schema:
            type: integer
        - name: result
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of QC reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QcReport"
    post:
      operationId: createQcReport
      tags: [qc]
      summary: Create QC report for a roll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQcReportRequest"
      responses:
        "201":
          description: Created QC report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QcReport"

  /qc-reports/{id}:
    get:
      operationId: getQcReport
      tags: [qc]
      summary: Get QC report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QC report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QcReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateQcReport
      tags: [qc]
      summary: Update QC report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQcReportRequest"
      responses:
        "200":
          description: Updated QC report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QcReport"

  # Dyeing Orders
  /dyeing-orders:
    get:
      operationId: listDyeingOrders
      tags: [dyeing]
      summary: List dyeing orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of dyeing orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DyeingOrder"
    post:
      operationId: createDyeingOrder
      tags: [dyeing]
      summary: Create dyeing order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDyeingOrderRequest"
      responses:
        "201":
          description: Created dyeing order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DyeingOrder"

  /dyeing-orders/{id}:
    get:
      operationId: getDyeingOrder
      tags: [dyeing]
      summary: Get dyeing order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dyeing order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DyeingOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDyeingOrder
      tags: [dyeing]
      summary: Update dyeing order status/details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDyeingOrderRequest"
      responses:
        "200":
          description: Updated dyeing order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DyeingOrder"

  # Warehouses
  /warehouses:
    get:
      operationId: listWarehouses
      tags: [warehouses]
      summary: List warehouses
      responses:
        "200":
          description: List of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: createWarehouse
      tags: [warehouses]
      summary: Create warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarehouseRequest"
      responses:
        "201":
          description: Created warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [warehouses]
      summary: Get warehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateWarehouse
      tags: [warehouses]
      summary: Update warehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWarehouseRequest"
      responses:
        "200":
          description: Updated warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  # Warehouse movements
  /warehouse-movements:
    get:
      operationId: listWarehouseMovements
      tags: [warehouses]
      summary: List warehouse movements
      parameters:
        - name: fabricRollId
          in: query
          schema:
            type: integer
        - name: warehouseId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of warehouse movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WarehouseMovement"
    post:
      operationId: createWarehouseMovement
      tags: [warehouses]
      summary: Move roll between warehouses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarehouseMovementRequest"
      responses:
        "201":
          description: Created movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseMovement"

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [sales]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [sales]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [sales]
      summary: Get customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCustomer
      tags: [sales]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  # Sales Orders
  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [sales]
      summary: List sales orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of sales orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesOrder"
    post:
      operationId: createSalesOrder
      tags: [sales]
      summary: Create sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesOrderRequest"
      responses:
        "201":
          description: Created sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"

  /sales-orders/{id}:
    get:
      operationId: getSalesOrder
      tags: [sales]
      summary: Get sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSalesOrder
      tags: [sales]
      summary: Update sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderRequest"
      responses:
        "200":
          description: Updated sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"

  # Dashboard
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/roll-status-breakdown:
    get:
      operationId: getRollStatusBreakdown
      tags: [dashboard]
      summary: Get roll count by status
      responses:
        "200":
          description: Roll status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/production-by-month:
    get:
      operationId: getProductionByMonth
      tags: [dashboard]
      summary: Get production count by month (last 6 months)
      responses:
        "200":
          description: Production by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyCount"

  # Audit Logs
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [dashboard]
      summary: List audit logs
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  # Billing
  /billing/subscription:
    get:
      operationId: getBillingSubscription
      tags: [billing]
      summary: Get tenant billing subscription snapshot
      responses:
        "200":
          description: Billing subscription snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscription"

  /billing/checkout-session:
    post:
      operationId: createBillingCheckoutSession
      tags: [billing]
      summary: Create Stripe Checkout session for a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSessionResponse"

  /billing/customer-portal:
    post:
      operationId: createBillingCustomerPortal
      tags: [billing]
      summary: Create Stripe customer portal session
      responses:
        "200":
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSessionResponse"

  /billing/webhook:
    post:
      operationId: handleBillingWebhook
      tags: [billing]
      summary: Handle Stripe webhook events
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingWebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        companyName:
          type: string
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
      required:
        - companyName
        - email
        - password
        - fullName

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
